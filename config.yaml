# Gemini 前端路由（过渡方案，ACP 稳定后切换到 sessions_spawn）
# type=frontend/ui/h5 的队列任务会路由到 Gemini tmux 窗口
gemini:
  default_window: "gemini-h5"   # 默认 Gemini tmux 窗口
  model: "gemini-3.1-pro-preview"  # 强制锁 Pro，不允许降级到 Flash
  approval_mode: "yolo"         # yolo=全自动批准 | auto_edit=自动批文件写入 | default=手动确认
  project_windows:              # 项目特定映射（可选）
    youxin: "gemini-youxin"     # 有信前端 → 专用 Gemini 窗口
    shike: "gemini-shike"       # 识客前端 → 专用 Gemini 窗口

# Branch 隔离模式（Phase 1）
branch_isolation:
  enabled: true
  default_mode: auto
  base_branch: main
  naming:
    prefix: ap
  policy:
    force_branch_types: [feature, refactor, test, review_fix]
    allow_main_types: [ops, report]
  auto_merge:
    enabled: true
    strategy: squash
    require_auto_check: true
    require_tests: true
  cleanup:
    ttl_hours: 72
    keep_failed_hours: 168

# Test Agent（Phase 1: Jest + review CLEAN 触发）
test_agent:
  enabled: true
  mode: "shared"
  trigger:
    on_review_clean: true
    on_commit_evaluate: true
    nightly: "02:30"
  queue:
    max_tasks_per_round: 3
    priority: "normal"
  coverage:
    changed_files_min: 80
    global_no_regression: true
    ratchet_weekly: 1
    ratchet_cap: 90
    critical_paths: ["src/core", "scripts"]
    critical_min: 90
  quality_gate:
    min_assertions: 1
    disallow_empty: true
    require_coverage_delta: true
    rerun_times: 2
  frameworks:
    jest:
      test_cmd: "if [ -f pnpm-workspace.yaml ] && [ -f apps/api/package.json ] && [ -f apps/web/package.json ]; then api_status=0; web_status=0; pnpm --filter @shike/api test:coverage || api_status=$?; pnpm --filter @shike/web test:coverage || web_status=$?; node scripts/merge-monorepo-coverage.mjs || true; [ $api_status -eq 0 ] && [ $web_status -eq 0 ]; else npm test -- --coverage --ci; fi"
      coverage_file: "coverage/coverage-summary.json"
    junit:
      test_cmd: "./gradlew test jacocoTestReport"
      coverage_file: "build/reports/jacoco/test/jacocoTestReport.xml"
    bats:
      test_cmd: "bats test/"
      coverage_file: null

# 高级模式: 使用 ~/.autopilot/projects/ 目录
# 每个项目一个子目录，包含 tasks.yaml
#
# 目录结构:
# ~/.autopilot/
# ├── config.yaml                   # 此文件
# ├── state.json                    # 自动生成的状态文件
# └── projects/
#     ├── shike/
#     │   ├── tasks.yaml            # 任务定义
#     │   └── state.json            # 项目状态（自动生成）
#     ├── simcity/
#     │   └── tasks.yaml
#     └── portfolio/
#         └── tasks.yaml
#
# tasks.yaml 示例:
# project:
#   name: "Shike"
#   dir: "/Users/wes/Shike"
#   description: "食客 App"
#   enabled: true
#   priority: 1                    # 数字越小优先级越高
#   overrides:                     # 可选：项目级配置覆盖
#     cooldown: 90                 # 这个项目可以更频繁
#     max_daily_sends: 80          # 这个项目允许更多发送
#
# tasks:
#   - id: "setup-project"
#     name: "项目初始化"
#     prompt: |
#       初始化项目...
#     done_when:
#       files:
#         - path: "package.json"

# CLI 路径（launchd 环境 PATH 可能不含 /opt/homebrew/bin）
codex_path: "/opt/homebrew/bin/codex"
tmux_path: "/opt/homebrew/bin/tmux"

# 日志
log_dir: "/tmp/autopilot"
log_max_size: 1048576        # 1MB
log_keep: 2                  # 保留几份旧日志

# Visual review agent (review-agent.sh)
# Screenshots frontend pages after commit, sends to Claude vision for QA
review_agent:
  enabled: true
  cooldown: 300              # 同项目两次 review 最小间隔 (秒)
  min_lines: 10              # 最小改动行数才触发
  fix_cooldown: 3600         # 自动入队修复任务冷却 (秒，防循环)
  # model: claude-sonnet-4-20250514  # vision model (默认 sonnet 省钱)
